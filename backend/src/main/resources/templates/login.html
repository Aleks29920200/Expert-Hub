<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>SkillSharing - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous"/>

  <style>
    /* All CSS from your original code goes here. It is correct for the styling. */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      padding: 40px 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .login-container h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #4c1d95;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.3s;
    }

    .input-group input:focus {
      border-color: #6366f1;
      outline: none;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(to right, #9333ea, #4f46e5);
      border: none;
      padding: 12px;
      color: #fff;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease;
    }

    .login-btn:hover {
      background: linear-gradient(to left, #9333ea, #4f46e5);
    }

    .separator {
      text-align: center;
      margin: 25px 0;
      position: relative;
    }

    .separator::before, .separator::after {
      content: "";
      height: 1px;
      width: 40%;
      background: #ccc;
      position: absolute;
      top: 50%;
    }

    .separator::before {
      left: 0;
    }

    .separator::after {
      right: 0;
    }

    .separator span {
      background: white;
      padding: 0 10px;
      font-size: 14px;
      color: #555;
    }

    .social-login {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      color: white;
      transition: background 0.3s ease;
    }

    .social-btn.facebook {
      background: #3b5998;
    }

    .social-btn.facebook:hover {
      background: #314d86;
    }

    .social-btn.discord {
      background: #5865F2;
    }

    .social-btn.discord:hover {
      background: #4752C4;
    }

    .social-btn i {
      font-size: 18px;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
<div class="login-container">
  <h2>Login</h2>
  <form th:action="@{/login}" method="post">
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" minlength="5" required>
    </div>
    <button type="submit" class="login-btn">Continue</button>
  </form>


  <div class="separator"><span>or</span></div>
  <div>
    <p>If you are not register yet.You can make it right now</p>
    <a th:href="@{/registerClient}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition-colors transform hover:scale-105">
      Register As Client
    </a>
    <a th:href="@{/registerExpert}" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition-colors transform hover:scale-105">
      Register As Expert
    </a>
  </div>

  <div class="social-login">
    <a th:href="@{/oauth2/authorization/facebook}" class="social-btn facebook">
      <i class="fab fa-facebook-f"></i> Login with Facebook
    </a>
    <a th:href="@{/oauth2/authorization/discord}" class="social-btn discord">
      <i class="fab fa-discord"></i> Login with Discord
    </a>
  </div>

</div>
</body>
</html>
