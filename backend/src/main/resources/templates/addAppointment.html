<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SkillSharing</title>
    <link rel="stylesheet" href="/css/reset-css.css"/>
    <link rel="stylesheet" href="/css/bootstrap.min.css"/>
    <link rel="stylesheet" type="text/css" href="/css/main.css"/>
    <script src="/js/jquery-3.5.1.slim.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }
        .cutout-form {
            width: 300px;
            height: auto;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }
        input[type="text"], input[type="datetime-local"] {
            padding: 10px;
            width: 100%;
            margin: 10px 0;
        }
        input[type="button"], button[type="submit"] {
            padding: 10px;
            width: 100%;
            margin: 10px 0;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
        }
        #eventList {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            list-style: none; /* Changed from ul to div/list style cleanup */
            padding: 0;
        }
        .event-item { /* Changed event-item to a class */
            padding: 5px;
            margin: 5px 0;
            background: #f8f9fa;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        .event-item:hover {
            background: #e2e2e2;
        }
        .event-list { /* Changed event-list to a class */
            width: 400px;
            height: auto;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="cutout-form">
    <h3>Add Event</h3>
    <form id="appointmentForm" th:object="${addAppointment}" th:action="@{/user/addAppointment}" th:method="post" onsubmit="return addEvent(event)">
        <div class="form-row">
            <label for="eventName">Event Name:</label>
            <input id="eventName" th:name="*{name}" type="text" th:field="*{name}" placeholder="Enter event name">
        </div>
        <div class="form-row">
            <label for="eventTime">Event Time:</label>
            <input id="eventTime" th:name="*{dateOfAppointment}" type="datetime-local" th:field="*{dateOfAppointment}">
        </div>
        <button id="addButton" type="submit">Add event</button>
    </form>

    <h3>Remove Event</h3>
    <p>Select an event then click on him to select it and press the button to remove it</p>
    <div id="eventList">
    </div>
    <form th:action="@{/remove}" method="post">
        <input type="hidden" id="selectedAppointment" name="appointmentToRemove" value="" />
        <input id="removeButton" value="Remove Event" type="button" onclick="removeSelectedEvent()">
    </form>
</div>

<script th:inline="javascript">
    const selectedDate = localStorage.getItem("selectedDate"); // e.g., "15 12 2025"

    // This function returns the full localStorage key for the selected day
    function getEventStorageKey() {
        return selectedDate ? `${selectedDate}my` : null;
    }

    // Function to load events from localStorage for the selected day
    function loadEvents() {
        const key = getEventStorageKey();
        if (!key) return [];
        let events = localStorage.getItem(key);
        return events ? JSON.parse(events) : [];
    }

    function addEvent(event) {
        // Prevent default form submission to handle locally first
        event.preventDefault();

        const eventName = document.getElementById('eventName').value;
        const eventDateTime = document.getElementById('eventTime').value;

        if (!eventName || !eventDateTime) {
            alert("Please provide both event name and date/time");
            return false;
        }

        // Get the time portion from the datetime-local input (if needed)
        // For simplicity, we save the full datetime string in this fix.
        const eventTime = eventDateTime;

        let events = loadEvents();

        // Check for duplicates
        const eventExists = events.some(event => event.name === eventName && event.time === eventTime);
        if (eventExists) {
            alert("An event with the same name and time already exists for this date.");
            return false;
        }

        events.push({ name: eventName, time: eventTime });
        localStorage.setItem(getEventStorageKey(), JSON.stringify(events));

        loadEventList();

        // Clear inputs
        document.getElementById('eventName').value = '';
        document.getElementById('eventTime').value = '';

        // Reload the opener window (the main calendar) and close the popup
        if (window.opener) {
            window.opener.location.reload();
        }
        self.close();
        return false; // Prevent form submission
    }

    function loadEventList() {
        const events = loadEvents();
        const eventListDiv = document.getElementById('eventList');
        eventListDiv.innerHTML = '';

        events.forEach((event, index) => {
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';

            // Format time for display (adjust as needed if you only want the time part)
            const timePart = event.time.split('T').pop() || event.time;

            eventItem.textContent = `${event.name} at ${timePart}`;
            eventItem.dataset.index = index;
            eventItem.onclick = () => selectEvent(eventItem);
            eventListDiv.appendChild(eventItem);
        });
    }

    function selectEvent(eventItem) {
        const selectedItems = document.querySelectorAll('.event-item');
        selectedItems.forEach(item => item.style.backgroundColor = '#f8f9fa');
        eventItem.style.backgroundColor = '#d6e9f5';
        localStorage.setItem('selectedEventIndex', eventItem.dataset.index);
    }

    function removeSelectedEvent() {
        const selectedIndex = localStorage.getItem('selectedEventIndex');
        if (selectedIndex === null) {
            alert("Please select an event to remove.");
            return;
        }

        // Get the event data to pass to the Spring controller if needed
        const events = loadEvents();
        const eventToRemove = events[selectedIndex];

        // Optional: Set hidden field for Spring controller removal (if you uncomment the Spring form logic)
        // document.getElementById("selectedAppointment").value = eventToRemove.name + " " + eventToRemove.time;
        // alert("Selected for removal: " + document.getElementById("selectedAppointment").value); // For confirmation

        // Remove from local storage
        events.splice(selectedIndex, 1);
        localStorage.setItem(getEventStorageKey(), JSON.stringify(events));

        loadEventList();
        localStorage.removeItem('selectedEventIndex');

        // Reload the opener window (the main calendar) and close the popup
        if (window.opener) {
            window.opener.location.reload();
        }
        self.close();
    }

    // Initial load
    loadEventList();
</script>
</body>
</html>
